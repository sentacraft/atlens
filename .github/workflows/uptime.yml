name: Uptime

# Post-deploy safety net against PRODUCTION. Two checks, run on a schedule:
#   1. Reachability/render — probe a rotating sample of sitemap URLs (status +
#      rendered HTML). Detection, not prevention: wouldn't have stopped the #397
#      deploy, but would have alerted within ~30 min. (cf-smoke prevents that
#      class at PR time; this is the safety net.)
#   2. SSG cache behavior — assert SSG pages are actually served from the
#      incremental cache (x-nextjs-cache: HIT), not silently re-rendered as
#      edge-SSR. Only prod exercises the full chain (build + populateCache remote
#      + deploy), so this lives here rather than in cf-smoke.
# A failure in either opens/updates a single tracking issue.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: uptime
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  probe:
    name: Probe production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Reachability / render
        run: node scripts/uptime-check.mjs
        env:
          BASE_URL: https://atlens.app
          # Sample ~50 URLs per run via deterministic rotation seeded by the run
          # number, so consecutive runs cover the whole sitemap with no overlap.
          # (cf-smoke sweeps all URLs against local workerd; the prod cron stays
          # light.) Bump UPTIME_SAMPLE to widen each run.
          UPTIME_SAMPLE: "50"
          UPTIME_RUN_INDEX: ${{ github.run_number }}

      - name: SSG cache behavior
        run: node scripts/check-cache-headers.mjs
        env:
          BASE_URL: https://atlens.app

      - name: Open / update incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "A scheduled production check failed — see the run log for which check (reachability or SSG cache) and which URL.",
              "",
              runUrl,
              "",
              "Reachability sweeps a rotating sample of the sitemap; SSG-cache asserts pages still serve from the incremental cache (x-nextjs-cache: HIT) rather than degrading to edge-SSR. Cf. #397 (detail-page outage) and #400 (SSG cache wiring).",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "uptime-failure",
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "🚨 Production uptime / cache check failed",
                body,
                labels: ["uptime-failure"],
              });
            }

      # The GitHub issue above is a record, not an alert: a bot-created issue
      # notifies nobody, and GitHub's built-in Actions email can't be scoped to
      # one workflow (it would also fire on every routine CI failure). So this
      # workflow pushes its OWN alert — fired only when an uptime check fails.
      # Set the BARK_URL secret to your Bark base URL incl. device key
      # (https://api.day.app/<key>); if unset, this step no-ops (issue still created).
      - name: Push alert (Bark) on failure
        if: failure()
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
        run: |
          if [ -z "$BARK_URL" ]; then
            echo "BARK_URL secret not set — skipping push (issue still created)."
            exit 0
          fi
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsS -X POST "${BARK_URL%/}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"🚨 Atlens production check failed\",\"body\":\"Reachability or SSG-cache check went red. Tap to open the run.\",\"group\":\"atlens\",\"level\":\"timeSensitive\",\"url\":\"$run_url\"}" \
            || echo "Bark push failed (issue still created)."
