name: Synthetic Uptime

# Post-deploy safety net: probe production every 30 min, one canary URL per
# route template. Detection, not prevention — it would not have stopped the
# #397 deploy, but it would have alerted within ~30 min instead of relying on
# someone noticing. Pairs with the cf-smoke workflow (which prevents the class
# at PR time) and the check-static-routes build gate (which catches the exact
# fallback:false cause).

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: synthetic
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  probe:
    name: Probe production canaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Probe canaries
        run: node scripts/synthetic-check.mjs
        env:
          BASE_URL: https://atlens.app

      - name: Open / update incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "A scheduled synthetic check failed — an entire page type may be down in production.",
              "",
              `Run log (shows which route template is red): ${runUrl}`,
              "",
              "Canaries are one-URL-per-route-template, so a red bucket means that whole route shape is failing (cf. #397, where every detail page 404'd while the homepage stayed up).",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "synthetic-failure",
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "🚨 Synthetic uptime check failed",
                body,
                labels: ["synthetic-failure"],
              });
            }
