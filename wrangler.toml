name = "atlens"
main = ".open-next/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Workers Builds rewrites Text bindings from this section on every deploy,
# overwriting anything added via the Dashboard. Non-secret config must
# live here. Secrets (e.g. GITHUB_TOKEN) stay in the Dashboard.
[vars]
SITE_URL = "https://xglass.sentacraft.com"
GITHUB_FEEDBACK_REPO = "sentacraft/x-glass-pipeline"
GITHUB_FEEDBACK_ASSIGNEES = "sentacraft"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "xglass_events"

# Rate-limit counters for /api/chat (per-IP burst + per-IP/global daily token
# budgets). The RATE_LIMIT_BYPASS secret (dashboard / `wrangler secret put`) exempts
# the developer's own testing.
[[kv_namespaces]]
binding = "RATE_KV"
id = "b4eeeb3afdca4f038de649dd3ecbea5f"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
